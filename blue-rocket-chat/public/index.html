<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Blue Rocket - Launch</title>
  <style>
    body { background: #0d1b2a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #1b263b; padding: 30px; border-radius: 12px; text-align: center; width: 280px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
    input { width: 90%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; }
    button { width: 97%; padding: 12px; background: #0077b6; color: white; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size: 50px;">🚀</div>
    <h2>Blue Rocket Login</h2>
    <form id="regForm">
      <input type="text" id="user" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="pass" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>
  <script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('user').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('pass').value;
      localStorage.setItem('pendingEmail', email);

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      if (res.ok) window.location.href = '/verify.html';
      else alert('Signup failed');
    });
  </script>
</body>
</html>
